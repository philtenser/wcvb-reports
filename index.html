<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Tenser | Latest Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .article-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .article-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="py-12 px-4">
    <div class="max-w-2xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-900 tracking-tight text-gray-900 uppercase">Phil Tenser</h1>
            <p class="text-red-600 font-bold tracking-widest uppercase text-sm mt-2">Latest Journalism Portfolio</p>
            <div class="h-1 w-20 bg-red-600 mx-auto mt-4"></div>
        </header>

        <div id="article-list" class="space-y-6">
            <p class="text-center text-gray-500 animate-pulse">Loading latest reports...</p>
        </div>

        <footer class="mt-16 text-center text-gray-400 text-xs border-t pt-8">
            <p>Automated tracker updated daily via WCVB.com</p>
        </div>
    </div>

    <script>
        async function loadArticles() {
            try {
                // Fetch the JSON file created by your Python script
                const response = await fetch('articles.json');
                const articles = await response.json();
                const listElement = document.getElementById('article-list');
                
                if (articles.length === 0) {
                    listElement.innerHTML = "<p class='text-center text-gray-500'>No articles found yet. Check back soon!</p>";
                    return;
                }

                listElement.innerHTML = articles.map(art => `
                    <a href="${art.url}" target="_blank" class="block article-card bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${art.date}</span>
                            <span class="text-red-600 text-xs font-bold italic">WCVB →</span>
                        </div>
                        <h2 class="text-xl font-bold text-gray-800 leading-tight hover:text-red-600 transition-colors">
                            ${art.title}
                        </h2>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('article-list').innerHTML = "<p class='text-center text-red-500'>Failed to load articles. Ensure the script has run!</p>";
            }
        }
        loadArticles();
    </script>
</body>
</html>
