<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Tenser | Latest Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1a1a1a; }
        .serif { font-family: 'Playfair Display', serif; }
        .article-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid #eee;
        }
        .article-card:hover { 
            background-color: #f8fafc;
            padding-left: 1rem;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body class="py-16 px-6">
    <div class="max-w-3xl mx-auto">
        <header class="mb-16 border-b-2 border-black pb-8">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-5xl font-900 tracking-tighter uppercase leading-none">Phil Tenser</h1>
                    <p class="text-lg text-gray-600 mt-2 italic serif">Journalism Portfolio & Latest Reports</p>
                </div>
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-bold uppercase tracking-widest text-red-600">Live Wire</p>
                    <p class="text-xs text-gray-400" id="last-updated">Updating daily...</p>
                </div>
            </div>
        </header>

        <div id="article-list" class="space-y-2">
            <div class="py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-red-600 mb-4"></div>
                <p class="text-gray-400 text-sm font-medium tracking-widest uppercase">Syncing with WCVB Newsroom...</p>
            </div>
        </div>

        <footer class="mt-20 pt-10 border-t border-gray-200 text-center">
            <p class="text-gray-400 text-sm mb-2">Automated content tracking for professional archiving.</p>
            <p class="text-xs font-bold tracking-widest uppercase text-gray-300">
                Built with <span class="text-red-500 text-base">✧</span> vibe coding
            </p>
        </footer>
    </div>

    <script>
        async function loadArticles() {
            const listElement = document.getElementById('article-list');
            const timeElement = document.getElementById('last-updated');
            
            try {
                // Fetch with cache-buster to ensure co-author updates show immediately
                const response = await fetch('./articles.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('Data sync failed');
                
                const articles = await response.json();
                
                if (!articles || articles.length === 0) {
                    listElement.innerHTML = `
                        <div class="py-20 text-center border-2 border-dashed border-gray-100 rounded-xl">
                            <p class="text-gray-400 italic serif text-lg">No verified reports found in the current scan.</p>
                        </div>`;
                    return;
                }

                // Update the "Last Updated" timestamp using the first article's scrape time
                if (articles[0].scraped_at) {
                    const date = new Date(articles[0].scraped_at);
                    timeElement.innerText = 'Last sync: ' + date.toLocaleDateString();
                }

                listElement.innerHTML = articles.map(art => `
                    <div class="article-card py-8 group cursor-pointer">
                        <a href="${art.url}" target="_blank" class="block">
                            <div class="flex items-center space-x-2 mb-3">
                                <span class="bg-red-600 text-white text-[10px] font-black px-2 py-0.5 uppercase tracking-tighter">WCVB-TV</span>
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${art.date || 'Report'}</span>
                            </div>
                            <h2 class="text-2xl font-bold leading-tight text-gray-900 group-hover:text-red-700 transition-colors serif">
                                ${art.title}
                            </h2>
                            <p class="mt-3 text-sm text-gray-400 uppercase font-bold tracking-tighter group-hover:text-gray-600">
                                View Full Coverage <span class="ml-1 inline-block transition-transform group-hover:translate-x-1">⟶</span>
                            </p>
                        </a>
                    </div>
                `).join('');

            } catch (e) {
                console.error(e);
                listElement.innerHTML = `
                    <div class="p-8 text-center bg-red-50 rounded-lg border border-red-100">
                        <p class="text-red-600 font-bold tracking-tight">System Sync Error</p>
                        <p class="text-red-400 text-xs mt-1">Please try a hard refresh (Cmd+Shift+R)</p>
                    </div>`;
            }
        }
        loadArticles();
    </script>
</body>
</html>
