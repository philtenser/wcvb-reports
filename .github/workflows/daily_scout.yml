name: Daily Byline Update

on:
  schedule:
    - cron: '0 8 * * *' # Runs daily at 8 AM UTC
  workflow_dispatch: # Allows you to run it manually whenever you want

permissions:
  contents: write # Grants the bot permission to save files to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches full history so rebase works properly

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scout.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PhilTenser-Bot"
          git config --global user.email "bot@philtenser.com"
          git add articles.json
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: New articles found"
          # Pull any changes you made in the browser first, then stack the bot's work on top
          git pull --rebase origin main
          git push origin main
